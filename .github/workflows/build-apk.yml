name: Gerar APK Android

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Gerar APK
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Configurar Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Gerar APK Debug
        working-directory: mercadinho-oliveira-apk-android
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - name: Enviar APK como arquivo
        uses: actions/upload-artifact@v4
        with:
          name: Mercadinho-Oliveira-APK
          path: mercadinho-oliveira-apk-android/app/build/outputs/apk/debug/*.apk
